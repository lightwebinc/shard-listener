name: bsl-e2e

services:
  e2e:
    build:
      # Context is the parent directory that contains both repos side-by-side,
      # matching the replace directive in the listener's go.mod.
      context: ../..
      dockerfile: shard-listener/test/Dockerfile.e2e
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      SHARD_BITS: "${SHARD_BITS:-2}"
      UDP_LISTEN_PORT: "9000"
      MC_EGRESS_PORT: "9001"
      RECV_TIMEOUT: "${RECV_TIMEOUT:-15s}"
    restart: "no"
