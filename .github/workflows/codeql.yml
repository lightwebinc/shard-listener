name: CodeQL

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'  # weekly, Monday 03:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          path: shard-listener

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/shard-common
          path: shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: shard-listener/go.mod

      - name: Use local shard-common
        working-directory: shard-listener
        run: go mod edit -replace github.com/lightwebinc/shard-common=../shard-common

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build for CodeQL
        working-directory: shard-listener
        run: go build -buildvcs=false ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
